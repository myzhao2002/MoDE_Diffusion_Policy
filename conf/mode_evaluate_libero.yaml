eval_cfg_overwrite:
  datamodule:
    datasets:
      lang_dataset:
        lang_folder: lang_annotations
  model:
    num_sampling_steps: 10

# 训练 run 的 hydra 输出目录(含 .hydra/config.yaml，模型按它重建，会带上 use_dino=True)。
# 开机后用 `ls logs/runs/2026-06-02/` 找到本次训练的实际时间戳目录，改这里。
train_folder: /root/autodl-tmp/MoDE_Diffusion_Policy/logs/runs/2026-06-02/18-37-07
# 权重文件绝对路径。last.ckpt = 训练最后一轮(save_last)，文件名固定、最稳。
# 想用按 val_act 选出的 best，换成 MoDE_ckpts/best-epoch=XX-val_act/lang_act_loss_pp=0.XXXX.ckpt
checkpoint: /root/autodl-tmp/MoDE_ckpts/last.ckpt
device: 0

# 原子计划 jsonl(必须和训练用的同一个，训练开了 plan fusion，eval 也要开才一致)。
plan_file: /root/autodl-tmp/LIBERO-datasets/plans_libero_all_tasks.jsonl


log_dir: /root/autodl-tmp/MoDE_Diffusion_Policy/outputs/libero_eval
dataset_path: /root/autodl-tmp/MoDE_Diffusion_Policy/dataset/calvin_debug_dataset
# 每个 task 只存前 N 个 rollout 的视频(0=完全不存)。原来是 30,会把每个
# task 的 20 个 rollout 全存成 mp4(40 任务=800 个),太占盘。改成 2。
# 想看更多就 CLI 覆盖,例如 num_videos=5;一个都不要就 num_videos=0。
num_videos: 2
debug: False

log_wandb: True
wandb_entity: omeryagmurlu

num_sampling_steps: null
sampler_type: null
multistep: null
sigma_min: null
sigma_max: null
noise_scheduler: null

num_sequences: 50
max_steps: 520
n_eval: 20
task_embedding_format: clip

# 全集 = 训练用的四个基础套件(40 任务)。逗号分隔，main() 会逐套件评测再汇总。
# 想只评单套件就填一个，例如 libero_10。
benchmark_name: libero_spatial,libero_object,libero_goal,libero_10 # [libero_spatial, libero_object, libero_goal, libero_10, libero_90]