ema:
  _target_: mode.callbacks.ema.EMA
  decay: 0.999
  start_step: 0
  save_ema_weights_in_callback_state: True
  evaluate_ema_weights_instead: True

  power: 0.6666666666666666
  inv_gamma: 1.0
  min_value: 0.0
  max_value: 0.9999

rollout_lh:
  _target_: mode.rollout.libero_rollout.RolloutLibero
  _recursive_: false
  env_cfg:
    _target_: mode.wrappers.hulc_wrapper.HulcWrapper
  skip_epochs: ${rollout_lh_skip_epochs}
  # 训练用全集(libero_benchmark)，但训练内 rollout 只评估 rollout_benchmark(默认 libero_10)。
  # Training uses the full suite; the in-training rollout only evaluates rollout_benchmark.
  benchmark_name: ${rollout_benchmark}
  rollout_freq: 10
  num_videos: 0
  num_sequences: 50 # 128
  max_steps: 520
  empty_cache: false
  debug: false
  n_eval: 20
  num_procs: 10
  use_mp: false
  task_embedding_format: clip
  device: ${device}
  # Reuse the SAME plan file the data module loads, so the in-training rollout
  # evaluates WITH plan fusion (consistent with training). Set via the existing
  # `datamodule.plan_file=...` override — nothing extra to pass.
  plan_file: ${datamodule.plan_file}


checkpoint:
  _target_: pytorch_lightning.callbacks.ModelCheckpoint
  dirpath: /root/autodl-tmp/MoDE_ckpts
  filename: "best-{epoch:02d}-{val_act/lang_act_loss_pp:.4f}"
  monitor: "val_act/lang_act_loss_pp"
  mode: "min"
  save_top_k: 1
  save_last: true
  save_weights_only: true
  verbose: true
  every_n_epochs: 1