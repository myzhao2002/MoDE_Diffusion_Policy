# CALVIN callbacks WITHOUT the calvin_env-dependent long-horizon rollout.
# Use for finetuning when calvin_env isn't installed (rollout eval done separately).
# Checkpoint monitors the validation BC loss instead of the rollout metric.
ema:
  _target_: mode.callbacks.ema.EMA
  decay: 0.999
  start_step: 0
  save_ema_weights_in_callback_state: True
  evaluate_ema_weights_instead: True
  power: 0.6666666666666666
  inv_gamma: 1.0
  min_value: 0.0
  max_value: 0.9999

checkpoint:
  _target_: pytorch_lightning.callbacks.ModelCheckpoint
  save_top_k: 1
  save_last: True
  verbose: True
  monitor: val_act/lang_act_loss_pp
  mode: min
  dirpath: saved_models
  filename: 'calvin-{epoch:02d}'
  every_n_epochs: 1
